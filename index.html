        <script>
      (function replaceStudioHeroImage() {
        const studioHeroImageUrl = "https://image2url.com/r2/default/images/1774657530151-02de62d7-3811-483e-9f69-42e6fdb89456.blob";

        function applyStudioHeroImage() {
          const image = document.querySelector(".page-hero-media-studio .page-hero-device img");
          if (!image) {
            return;
          }

          if (image.src !== studioHeroImageUrl) {
            image.src = studioHeroImageUrl;
            image.srcset = "";
          }

          image.style.objectFit = "contain";
          image.style.objectPosition = "center center";
          image.style.width = "100%";
          image.style.height = "100%";
          image.style.display = "block";
        }

        const root = document.getElementById("root") || document.body;
        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(applyStudioHeroImage);
        });
        observer.observe(root, { childList: true, subtree: true });

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", applyStudioHeroImage, { once: true });
        } else {
          applyStudioHeroImage();
        }

        window.addEventListener("hashchange", () => {
          window.requestAnimationFrame(applyStudioHeroImage);
        });
      })();
    </script>

      (function initTubesCursor() {
        const canvas = document.getElementById("cursor-canvas");
        const shell = document.getElementById("cursor-canvas-shell");
        if (!canvas || !shell) {
          return;
        }

        const cursorConfig = {
          tubes: {
            count: 22,
            radius: 0.12,
            colors: ["#00f7ff", "#ff00f0", "#8040ff"],
            metalness: 0.9,
            roughness: 0.15,
            lights: {
              intensity: 600,
              colors: ["#00f7ff", "#ff00f0", "#c37eff", "#60aed5"]
            }
          }
        };

        function randomColors(count) {
          return new Array(count)
            .fill(0)
            .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0"));
        }

        shell.style.display = "block";

        import("https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js")
          .then(({ default: TubesCursor }) => {
            const app = TubesCursor(canvas, cursorConfig);
            document.body.classList.add("tubes-cursor-active");

            document.body.addEventListener("click", () => {
              const colors = randomColors(3);
              const lightsColors = randomColors(4);
              app.tubes.setColors(colors);
              app.tubes.setLightsColors(lightsColors);
            });
          })
          .catch((error) => {
            console.error("Failed to initialize tubes cursor.", error);
          });
      })();

      // Replace "What the work emphasizes" card image
      (function replaceWorkEmphasizesImage() {
        function doReplace() {
          // Try multiple selector patterns
          const selectors = [
            '.page-hero-note img',
            '.page-hero-note-list img', 
            'article.page-hero-note img',
            '.studio-visual ~ * img',
            '[class*="note"] img',
            '.page-hero-device + * img',
            'img[src*="city-showcase"]',
            'img[alt*="Webzad"]',
            'img[alt*="Representative"]'
          ];
          
          let replaced = false;
          selectors.forEach(selector => {
            try {
              const imgs = document.querySelectorAll(selector);
              imgs.forEach(img => {
                if (img.src && (img.src.includes('city-showcase') || img.src.includes('D0WoMA8Q') || selector.includes('note'))) {
                  img.src = 'assets/city-showcase-D0WoMA8Q.png?v=6';
                  img.style.objectFit = 'contain';
                  img.style.objectPosition = 'center center';
                  img.style.width = '100%';
                  img.style.height = '100%';
                  replaced = true;
                }
              });
            } catch(e) {}
          });
          return replaced;
        }
        
        // Run multiple times with delays
        [0, 100, 500, 1000, 2000, 3000].forEach(delay => {
          setTimeout(doReplace, delay);
        });
        
        // Also use observer for dynamic content
        const observer = new MutationObserver(() => {
          doReplace();
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
