        <script>
      (function replaceStudioHeroImage() {
        const studioHeroImageUrl = "https://image2url.com/r2/default/images/1774657530151-02de62d7-3811-483e-9f69-42e6fdb89456.blob";

        function applyStudioHeroImage() {
          const image = document.querySelector(".page-hero-media-studio .page-hero-device img");
          if (!image) {
            return;
          }

          if (image.src !== studioHeroImageUrl) {
            image.src = studioHeroImageUrl;
            image.srcset = "";
          }

          image.style.objectFit = "contain";
          image.style.objectPosition = "center center";
          image.style.width = "100%";
          image.style.height = "100%";
          image.style.display = "block";
        }

        const root = document.getElementById("root") || document.body;
        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(applyStudioHeroImage);
        });
        observer.observe(root, { childList: true, subtree: true });

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", applyStudioHeroImage, { once: true });
        } else {
          applyStudioHeroImage();
        }

        window.addEventListener("hashchange", () => {
          window.requestAnimationFrame(applyStudioHeroImage);
        });
      })();
    </script>

    <!-- 3D Tubes Cursor Effect -->
    <script type="module">
      (function initTubesCursor() {
        const canvas = document.getElementById("cursor-canvas");
        const shell = document.getElementById("cursor-canvas-shell");
        if (!canvas || !shell) {
          return;
        }

        const cursorConfig = {
          tubes: {
            count: 22,
            radius: 0.12,
            colors: ["#00f7ff", "#ff00f0", "#8040ff"],
            metalness: 0.9,
            roughness: 0.15,
            lights: {
              intensity: 600,
              colors: ["#00f7ff", "#ff00f0", "#c37eff", "#60aed5"]
            }
          }
        };

        function randomColors(count) {
          return new Array(count)
            .fill(0)
            .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0"));
        }

        shell.style.display = "block";

        import("https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js")
          .then(({ default: TubesCursor }) => {
            const app = TubesCursor(canvas, cursorConfig);
            document.body.classList.add("tubes-cursor-active");

            document.body.addEventListener("click", () => {
              const colors = randomColors(3);
              const lightsColors = randomColors(4);
              app.tubes.setColors(colors);
              app.tubes.setLightsColors(lightsColors);
            });
          })
          .catch((error) => {
            console.error("Failed to initialize tubes cursor.", error);
          });
      })();

      // Replace "What the work emphasizes" card image
      (function replaceWorkEmphasizesImage() {
        function doReplace() {
          // Try multiple selector patterns
          const selectors = [
            '.page-hero-note img',
            '.page-hero-note-list img', 
            'article.page-hero-note img',
            '.studio-visual ~ * img',
            '[class*="note"] img',
            '.page-hero-device + * img',
            'img[src*="city-showcase"]',
            'img[alt*="Webzad"]',
            'img[alt*="Representative"]'
          ];
          
          let replaced = false;
          selectors.forEach(selector => {
            try {
              const imgs = document.querySelectorAll(selector);
              imgs.forEach(img => {
                if (img.src && (img.src.includes('city-showcase') || img.src.includes('D0WoMA8Q') || selector.includes('note'))) {
                  img.src = 'assets/city-showcase-D0WoMA8Q.png?v=6';
                  img.style.objectFit = 'contain';
                  img.style.objectPosition = 'center center';
                  img.style.width = '100%';
                  img.style.height = '100%';
                  replaced = true;
                }
              });
            } catch(e) {}
          });
          return replaced;
        }
        
        // Run multiple times with delays
        [0, 100, 500, 1000, 2000, 3000].forEach(delay => {
          setTimeout(doReplace, delay);
        });
        
        // Also use observer for dynamic content
        const observer = new MutationObserver(() => {
          doReplace();
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();

    <!-- Form interception script -->
    <script>
      (function webzadFormFix() {
        /* Formsubmit.co endpoint */
        var FORM_ENDPOINT = "https://formsubmit.co/ajax/f11c4df9cac5fcb3a134c796bf5ee19c";
        var hookedForms = new WeakSet();

        /* Block ALL mailto: link clicks */
        document.addEventListener('click', function(e) {
          var el = e.target;
          while (el && el !== document.body) {
            if (el.tagName === 'A') {
              var href = el.getAttribute('href') || '';
              if (href.indexOf('mailto:') === 0) {
                e.preventDefault();
                e.stopImmediatePropagation();
                var formSection = document.getElementById('contact-form-panel')
                  || document.querySelector('.contact-form')
                  || document.querySelector('.contact-page-shell-clean');
                if (formSection) {
                  formSection.scrollIntoView({ behavior: 'smooth' });
                  var firstInput = formSection.querySelector('input[name="name"], input[type="text"], input');
                  if (firstInput) setTimeout(function() { firstInput.focus(); }, 400);
                } else {
                  window.location.hash = '#contact';
                }
                return false;
              }
              break;
            }
            el = el.parentElement;
          }
        }, true);

        /* Intercept form submission */
        document.addEventListener('submit', function(e) {
          var form = e.target;
          if (!form.classList.contains('contact-form')) return;
          e.preventDefault();
          e.stopImmediatePropagation();
          if (hookedForms.has(form)) return false;
          hookedForms.add(form);

          var data = {};
          var inputs = form.querySelectorAll('input, select, textarea');
          for (var i = 0; i < inputs.length; i++) {
            var inp = inputs[i];
            if (inp.name) data[inp.name] = inp.value;
          }

          var payload = new FormData();
          payload.append('name', data.name || '');
          payload.append('email', data.email || '');
          payload.append('company', data.company || '');
          payload.append('service', data.service || 'Signature Website');
          payload.append('timeline', data.timeline || '');
          payload.append('goals', data.goals || '');
          payload.append('_subject', data.company ? 'Webzad project inquiry from ' + data.company : 'Webzad project inquiry');
          payload.append('_replyto', data.email || '');
          payload.append('_template', 'table');

          var btn = form.querySelector('button[type="submit"]') || form.querySelector('button:last-of-type') || form.querySelector('.button-primary');
          var originalBtnText = btn ? btn.textContent : 'Send';
          if (btn) {
            btn.disabled = true;
            btn.textContent = 'Sending...';
          }

          fetch(FORM_ENDPOINT, {
            method: 'POST',
            headers: {
              Accept: 'application/json'
            },
            body: payload
          })
          .then(function(res) {
            if (res.ok) {
              showSuccess(form, btn, originalBtnText);
            } else {
              throw new Error('Formsubmit returned ' + res.status);
            }
          })
          .catch(function(err) {
            hookedForms.delete(form);
            console.error('[Webzad] Form error:', err);
            showError(form, btn, originalBtnText);
          });

          return false;
        }, true);

        function showSuccess(form, btn, originalText) {
          var oldMsg = form.querySelector('.form-confirmation');
          if (oldMsg) oldMsg.style.display = 'none';
          var successDiv = document.createElement('div');
          successDiv.className = 'formspree-success';
          successDiv.setAttribute('role', 'status');
          successDiv.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:48px 20px;animation:fadeIn 0.5s ease-out;';
          var iconSvg = '<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="url(#successGlow)"/><path d="M18 28.5L24.5 35L38 21" stroke="#070a14" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="successGlow" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#00f7ff"/><stop offset="1" stop-color="#ff00f6"/></linearGradient></defs></svg>';
          successDiv.innerHTML = '<div style="filter:drop-shadow(0 0 20px #00f7ff30);">' + iconSvg + '</div>' +
            '<h3 style="font-family:Space Grotesk,Manrope,system-ui,sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-0.04em;color:#f4f7fb;margin:0;">Thanks for contacting us</h3>' +
            '<p style="font-size:1rem;color:#d4ddece8;line-height:1.6;max-width:36ch;margin:0;">We\'ve received your request and will be in contact soon.</p>' +
            '<p style="font-size:0.84rem;color:#d4ddecaa;margin:0;">Expect a reply within 1 business day.</p>';
          form.innerHTML = '';
          form.appendChild(successDiv);
          form.classList.add('form-submitted');
          if (btn) {
            btn.disabled = false;
            btn.textContent = originalText;
          }
        }

        function showError(form, btn, originalText) {
          if (btn) {
            btn.disabled = false;
            btn.textContent = originalText;
          }
          var errDiv = form.querySelector('.formspree-error');
          if (!errDiv) {
            errDiv = document.createElement('p');
            errDiv.className = 'formspree-error';
            errDiv.style.cssText = 'color:#ff6b6b;font-size:0.88rem;font-weight:500;padding:12px 16px;background:#ff6b6b0a;border:1px solid #ff6b6b20;border-radius:12px;text-align:center;margin-top:12px;';
            form.appendChild(errDiv);
          }
          errDiv.textContent = "Something went wrong. Please try again in a moment.";
        }

        if (!document.getElementById('form-success-animations')) {
          var style = document.createElement('style');
          style.id = 'form-success-animations';
          style.textContent = '@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
          document.head.appendChild(style);
        }

        /* DOM-based mailto fix backup */
        function fixMailtoLinks() {
          document.querySelectorAll('a[href^="mailto:"]').forEach(function(link) {
            if (link.dataset.webzadFixed) return;
            link.dataset.webzadFixed = 'true';
            link.setAttribute('href', '#contact');
            link.addEventListener('click', function(e) {
              e.preventDefault();
              var formSection = document.getElementById('contact-form-panel')
                || document.querySelector('.contact-form')
                || document.querySelector('.contact-page-shell-clean')
                || document.getElementById('contact');
              if (formSection) {
                formSection.scrollIntoView({ behavior: 'smooth' });
                var firstInput = formSection.querySelector('input[name="name"], input[type="text"], input');
                if (firstInput) setTimeout(function() { firstInput.focus(); }, 400);
              }
            });
          });
        }
        fixMailtoLinks();
        setTimeout(fixMailtoLinks, 100);
        setTimeout(fixMailtoLinks, 500);
        setTimeout(fixMailtoLinks, 1000);
        setTimeout(fixMailtoLinks, 2000);
        if (window.MutationObserver) {
          var linkObserver = new MutationObserver(function() { fixMailtoLinks(); });
          linkObserver.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
        }
      })();
    </script>
