<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting | Webzad</title>
    <script>
      (function redirectToApp() {
        const currentUrl = new URL(window.location.href);
        const explicitHash =
          currentUrl.hash && currentUrl.hash !== "#" ? currentUrl.hash : "";
        const currentPath = currentUrl.pathname.replace(/\/+$/, "");
        const isDirect404 = /\/404\.html$/i.test(currentPath);
        const routeSegment = isDirect404 ? "" : currentPath.split("/").pop();
        const target = new URL("./index.html", currentUrl);
        target.hash = explicitHash || `#/${routeSegment || ""}${currentUrl.search}`.replace(/#\/\?/, "#/?");
        window.location.replace(target.href);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #070a14;
        color: #f5f7fb;
        font: 500 16px/1.5 Manrope, system-ui, sans-serif;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <noscript>
      <p><a href="./index.html#/">Open Webzad</a></p>
    </noscript>
  </body>
</html>
